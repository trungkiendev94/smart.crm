services:
  db:
    image: pgvector/pgvector:pg16
    container_name: smartcrm_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: smartcrm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartcrm_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: smartcrm_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - smartcrm_network

  webapi:
    build:
      context: .
      dockerfile: src/SmartCRM.WebAPI/Dockerfile
    container_name: smartcrm_webapi
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=smartcrm;Username=admin;Password=password123
      - ConnectionStrings__RabbitMQ=rabbitmq
      - AiSettings__Endpoint=http://host.docker.internal:5001/v1
    depends_on:
      - db
      - rabbitmq
    networks:
      - smartcrm_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  leadservice:
    build:
      context: .
      dockerfile: src/SmartCRM.LeadService/Dockerfile
    container_name: smartcrm_leadservice
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=smartcrm;Username=admin;Password=password123
      - ConnectionStrings__RabbitMQ=rabbitmq
    depends_on:
      - db
      - rabbitmq
    networks:
      - smartcrm_network

  dataingestion:
    build:
      context: .
      dockerfile: src/SmartCRM.DataIngestion/Dockerfile
    container_name: smartcrm_dataingestion
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=smartcrm;Username=admin;Password=password123
    depends_on:
      - db
    networks:
      - smartcrm_network
    profiles:
      - tools

  frontend:
    build:
      context: ./smartcrm-web
      dockerfile: Dockerfile
    container_name: smartcrm_frontend
    ports:
      - "8080:80"
    depends_on:
      - webapi
    networks:
      - smartcrm_network

networks:
  smartcrm_network:
    driver: bridge

volumes:
  postgres_data:
